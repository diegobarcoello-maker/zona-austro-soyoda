<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Centro de Comando Zona Austro</title>
<meta name="description" content="Dashboard de ventas y portal de asesores de la Zona Austro ГўВҖВ” Grupo Corporativo Soyoda S.A." />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#004475" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Zona Austro" />
<!-- Open Graph -->
<meta property="og:type" content="website" />
<meta property="og:title" content="Centro de Comando Zona Austro ГўВҖВ” Soyoda S.A." />
<meta property="og:description" content="Dashboard de ventas, portal de asesores y herramientas comerciales de la Zona Austro." />
<meta property="og:image" content="icon-192.png" />
<meta name="twitter:card" content="summary" />
<style>
  :root{
    --slate-50:#f8fafc; --slate-100:#f1f5f9; --slate-200:#e2e8f0; --slate-300:#cbd5e1;
    --slate-400:#94a3b8; --slate-500:#64748b; --slate-600:#475569; --slate-700:#334155; --slate-800:#1e293b;
    --blue-50:#eff6ff; --blue-100:#dbeafe; --blue-200:#bfdbfe; --blue-700:#1d4ed8; --blue-900:#1e3a8a; --blue-950:#172554;
    --amber-50:#fffbeb; --amber-300:#fcd34d; --amber-800:#92400e;
    --red-100:#fee2e2; --red-300:#fca5a5; --red-600:#dc2626; --red-700:#b91c1c;
    --yellow-100:#fef9c3; --yellow-300:#fde047; --yellow-800:#854d0e;
    --green-50:#f0fdf4; --green-100:#dcfce7; --green-300:#86efac; --green-500:#22c55e; --green-700:#15803d;
    --sky-500:#0ea5e9;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--slate-100);color:var(--slate-800);}
  .page{min-height:100vh;padding:16px;}
  .container{max-width:1120px;margin:0 auto;}
  .hidden{display:none !important;}
  .disclaimer{position:fixed;bottom:0;left:0;right:0;z-index:500;
    border:none;border-top:1px solid rgba(217,119,6,.2);
    background:rgba(255,251,235,.55);backdrop-filter:blur(6px);
    color:var(--amber-800);padding:7px 20px;
    font-size:11.5px;font-weight:500;line-height:1.5;margin:0;}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  @keyframes gradientShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
  @keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-12px,10px) scale(1.06);}}
  @keyframes popIn{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
  @keyframes shimmer{0%{background-position:-200px 0;}100%{background-position:200px 0;}}
  @keyframes spin{to{transform:rotate(360deg);}}

  .header-card{margin-bottom:20px;overflow:hidden;border-radius:18px;border:none;position:relative;
    background:linear-gradient(120deg,#003560,#004475,#0077c8,#002a4a);background-size:300% 300%;
    animation:gradientShift 14s ease infinite, fadeInUp .5s ease both;
    box-shadow:0 12px 30px -10px rgba(23,37,84,.55);}
  .header-card::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(circle at 88% 12%,rgba(255,255,255,.16),transparent 42%),
               radial-gradient(circle at 6% 95%,rgba(34,197,94,.18),transparent 38%);
    animation:floatBlob 9s ease-in-out infinite;}
  .header-stripe{height:4px;width:100%;position:relative;z-index:1;
    background:linear-gradient(90deg,#004475 0%,#0077c8 50%,#004475 100%);}
  .header-logo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .header-logo-img{height:28px;filter:brightness(0) invert(1);opacity:.92;}
  .header-body{padding:22px 24px;color:#fff;position:relative;z-index:1;}
  .header-body h1{margin:0 0 6px;font-size:clamp(20px,4vw,30px);font-weight:800;letter-spacing:-.5px;text-shadow:0 2px 14px rgba(0,0,0,.3);}
  .header-body p{margin:0;font-size:13px;color:var(--blue-200,#bfdbfe);}
  .header-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
  .hpill{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);color:#fff;border-radius:999px;
    padding:5px 13px;font-size:12px;font-weight:700;backdrop-filter:blur(3px);}
  .grid{display:grid;gap:12px;}
  .grid-5{grid-template-columns:repeat(2,1fr);}
  @media(min-width:640px){.grid-5{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:1024px){.grid-5{grid-template-columns:repeat(5,1fr);}}
  .grid-2{grid-template-columns:1fr;}
  @media(min-width:1024px){.grid-2{grid-template-columns:1fr 1fr;}}
  .card{background:#fff;border:1px solid var(--slate-200);border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04);
    animation:fadeInUp .5s ease both;transition:box-shadow .2s ease, transform .2s ease;}
  .card-sm{padding:14px;position:relative;overflow:hidden;}
  .card-sm:hover{box-shadow:0 10px 24px -8px rgba(30,41,59,.18);transform:translateY(-2px);}
  .icon-badge{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:8px;}
  .icon-badge.blue{background:var(--blue-100);} .icon-badge.green{background:var(--green-100);}
  .icon-badge.red{background:var(--red-100);} .icon-badge.yellow{background:var(--yellow-100);}
  .label-xs{font-size:12px;color:var(--slate-500);margin:0 0 4px;}
  .val-lg{font-size:21px;font-weight:800;color:var(--slate-800);margin:0;}
  .val-sub{font-size:12px;color:var(--slate-400);margin:2px 0 0;}
  .mb-20{margin-bottom:20px;}
  .progress-track{margin-top:8px;height:7px;border-radius:999px;background:var(--slate-200);overflow:hidden;}
  .progress-fill{height:100%;border-radius:999px;width:0;transition:width 1.1s cubic-bezier(.22,1,.36,1);}
  .progress-fill.green{background:linear-gradient(90deg,#4ade80,#15803d);}
  .progress-fill.yellow{background:linear-gradient(90deg,#fde047,#b45309);}
  .progress-fill.red{background:linear-gradient(90deg,#fca5a5,#b91c1c);}
  .badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;border:1px solid;padding:2px 10px;font-size:12px;font-weight:700;}
  .metric{display:inline-block;border-radius:6px;border:1px solid;padding:4px 8px;font-size:13px;font-weight:700;}
  .c-red{background:var(--red-100);color:var(--red-700);border-color:var(--red-300);}
  .c-yellow{background:var(--yellow-100);color:var(--yellow-800);border-color:var(--yellow-300);}
  .c-green{background:var(--green-100);color:var(--green-700);border-color:var(--green-300);}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  thead tr{background:var(--slate-50);border-bottom:1px solid var(--slate-200);}
  th{text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;color:var(--slate-500);}
  td{padding:10px 12px;border-bottom:1px solid var(--slate-100);}
  .table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--slate-200);background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .table-wrap table{min-width:880px;}
  .table-wrap.table-sm table{min-width:0;}
  tbody tr.row-clickable{cursor:pointer;transition:background .15s ease;}
  tbody tr.row-clickable:hover{background:var(--blue-50);}
  tbody tr.row-clickable td:first-child{font-weight:700;color:var(--slate-700);}
  .actions-grid{display:grid;grid-template-columns:1fr;gap:10px;}
  @media(min-width:640px){.actions-grid{grid-template-columns:1fr 1fr;}}
  @media(min-width:1024px){.actions-grid{grid-template-columns:repeat(4,1fr);}}
  .btn-action{display:flex;align-items:center;gap:8px;border-radius:12px;border:1px solid var(--slate-200);background:#fff;
    padding:13px 14px;font-size:14px;font-weight:700;color:var(--slate-700);cursor:pointer;text-align:left;
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;}
  .btn-action:hover{border-color:var(--blue-200);background:var(--blue-50);transform:translateY(-3px);
    box-shadow:0 10px 22px -8px rgba(29,78,216,.25);}
  .btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:9px;border:none;
    background:linear-gradient(135deg,#1d4ed8,#172554);color:#fff;font-weight:700;font-size:14px;padding:9px 16px;cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 18px -6px rgba(29,78,216,.4);}
  .btn-primary:disabled{background:var(--slate-300);cursor:not-allowed;transform:none;box-shadow:none;}
  .lock-card{border:1.5px dashed var(--slate-300);background:linear-gradient(135deg,var(--slate-50),#fff);
    border-radius:14px;padding:22px;text-align:center;animation:fadeInUp .5s ease both;}
  .lock-card .lock-icon{font-size:30px;margin-bottom:6px;animation:popIn .4s ease both;}
  .unlock-form{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
  .unlock-form input{max-width:160px;}
  .btn-unlock-toggle{background:none;border:none;color:var(--slate-400);font-size:11px;cursor:pointer;margin-top:10px;text-decoration:underline;}
  .btn-link{background:none;border:none;color:var(--blue-700);font-weight:600;font-size:14px;cursor:pointer;padding:0;margin-bottom:14px;}
  .btn-link:hover{text-decoration:underline;}
  select,input,textarea{font:inherit;border:1px solid var(--slate-300);border-radius:8px;padding:8px 10px;font-size:14px;width:100%;}
  .login-form{display:flex;flex-direction:column;gap:10px;}
  @media(min-width:640px){.login-form{flex-direction:row;align-items:center;}}
  .login-form select{max-width:260px;}
  .login-form input{max-width:160px;}
  .login-error{margin:8px 0 0;font-size:12px;font-weight:700;color:var(--red-700);}
  .hint{margin:8px 0 0;font-size:12px;color:var(--slate-400);}
  .modal-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:16px;}
  .modal-box{max-height:85vh;width:100%;max-width:640px;overflow-y:auto;border-radius:14px;background:#fff;box-shadow:0 10px 25px rgba(0,0,0,.2);}
  .modal-head{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--slate-200);background:var(--slate-50);padding:12px 18px;border-radius:14px 14px 0 0;}
  .modal-head h3{margin:0;font-size:15px;font-weight:800;color:var(--slate-800);}
  .modal-close{border:none;background:none;border-radius:999px;padding:4px 8px;font-size:16px;color:var(--slate-500);cursor:pointer;}
  .modal-close:hover{background:var(--slate-200);}
  .modal-body{padding:16px 18px;}
  .wa-block{border:1px solid var(--slate-200);background:var(--slate-50);border-radius:10px;padding:12px;margin-bottom:10px;}
  .wa-block p{margin:0 0 4px;font-size:12px;font-weight:800;color:var(--slate-600);}
  pre{white-space:pre-wrap;font-family:inherit;background:var(--slate-50);border-radius:10px;padding:12px;font-size:12px;color:var(--slate-700);margin:0;}
  .sim-banner{margin-top:10px;border-radius:8px;background:var(--blue-50);color:var(--blue-700);font-size:12px;font-weight:600;padding:8px 10px;}
  .confirm-banner{margin-top:10px;border-radius:8px;background:var(--green-50);color:var(--green-700);font-size:13px;font-weight:600;padding:8px 10px;}
  .portal-wrap{max-width:760px;margin:0 auto;}
  .portal-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .portal-head .who{display:flex;align-items:center;gap:14px;}
  .avatar{display:flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:999px;
    background:linear-gradient(135deg,#1d4ed8,#0ea5e9);color:#fff;font-size:22px;font-weight:800;
    box-shadow:0 0 0 4px var(--blue-50), 0 8px 18px -6px rgba(29,78,216,.45);animation:popIn .4s ease both;}
  .portal-head h2{margin:0;font-size:19px;font-weight:800;color:var(--slate-800);}
  .portal-head .sub{margin:0;font-size:12px;color:var(--slate-500);}
  .header-body .portal-head{margin-bottom:0;}
  .header-body .portal-head .avatar{box-shadow:0 0 0 4px rgba(255,255,255,.25), 0 8px 18px -6px rgba(0,0,0,.35);}
  .header-body .portal-head h2{color:#fff;font-size:clamp(18px,3.5vw,26px);text-shadow:0 2px 14px rgba(0,0,0,.3);}
  .header-body .portal-head .sub{color:var(--blue-200,#bfdbfe);font-size:13px;}
  .hist-item{background:var(--slate-50);border-radius:8px;padding:8px 12px;font-size:14px;color:var(--slate-600);margin-bottom:8px;}
  .section-title{margin:0 0 10px;font-size:14px;font-weight:800;color:var(--slate-700);}
  .border-top{border-top:1px solid var(--slate-200);margin-top:24px;padding-top:20px;}

  /* ----- CatГғВЎlogos de productos (portal asesor) ----- */
  .cat-grid{display:grid;grid-template-columns:1fr;gap:8px;}
  @media(min-width:640px){.cat-grid{grid-template-columns:1fr 1fr;}}
  .cat-item{display:flex;align-items:center;gap:10px;border:1px solid var(--slate-200);border-radius:10px;
    padding:9px 12px;text-decoration:none;background:#fff;transition:border-color .15s ease, background .15s ease, transform .15s ease;}
  .cat-item:hover{border-color:var(--blue-200);background:var(--blue-50);transform:translateY(-2px);}
  .cat-ico{font-size:18px;flex-shrink:0;}
  .cat-info{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0;}
  .cat-info b{font-size:13px;color:var(--slate-800);line-height:1.3;}
  .cat-info small{font-size:11px;color:var(--slate-500);}
  .cat-go{font-size:12px;font-weight:700;color:var(--blue-700);flex-shrink:0;white-space:nowrap;}
  .form-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  @media(min-width:640px){.form-grid{grid-template-columns:1fr 1fr;}}
  .field label{display:block;margin-bottom:4px;font-size:12px;font-weight:600;color:var(--slate-600);}
  .form-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;grid-column:1/-1;}
  .chart-legend{margin-top:6px;display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--slate-500);}
  .chart-legend .sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle;}

  /* ----- GrГғВЎficos interactivos (tooltip flotante + clic para detalle) ----- */
  .chart-card-hint{font-size:11.5px;color:var(--blue-700);font-weight:600;margin:-2px 0 10px;display:flex;align-items:center;gap:4px;}
  .ichart-bar{cursor:pointer;transition:opacity .15s ease, filter .15s ease;}
  .ichart-bar:hover{opacity:.82;filter:drop-shadow(0 3px 6px rgba(29,78,216,.25));}
  .ichart-pt{cursor:pointer;transition:r .12s ease;}
  .ichart-pt:hover{r:5.5;filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));}
  .ichart-hit{cursor:pointer;}
  .chart-tip{position:fixed;z-index:9999;pointer-events:none;background:var(--slate-800);color:#fff;
    font-size:12px;line-height:1.5;padding:8px 11px;border-radius:9px;box-shadow:0 10px 24px -6px rgba(0,0,0,.4);
    opacity:0;transform:translate(-50%,calc(-100% - 14px));transition:opacity .12s ease;max-width:220px;}
  .chart-tip.show{opacity:1;}
  .chart-tip b{display:block;margin-bottom:3px;font-size:12.5px;color:#bfdbfe;}
  .chat-box{max-height:280px;overflow-y:auto;border:1px solid var(--slate-200);border-radius:10px;background:var(--slate-50);padding:10px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px;}
  .chat-msg{max-width:85%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.45;white-space:pre-wrap;}
  .chat-msg.user{align-self:flex-end;background:var(--blue-950);color:#fff;}
  .chat-msg.bot{align-self:flex-start;background:#fff;border:1px solid var(--slate-200);color:var(--slate-700);}
  .chat-empty{font-size:13px;color:var(--slate-400);}
  .chat-form{display:flex;gap:8px;}
  .chat-form input{flex:1;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .chip{border:1px solid var(--slate-200);background:#fff;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:600;color:var(--slate-600);cursor:pointer;}
  .chip:hover{border-color:var(--blue-200);background:var(--blue-50);}
  .field textarea{resize:vertical;}
  details.report-toggle{margin-top:24px;border-top:1px solid var(--slate-200);padding-top:20px;}
  details.report-toggle summary{cursor:pointer;font-size:14px;font-weight:800;color:var(--slate-700);}
  .mini-table{width:100%;border-collapse:collapse;margin-top:6px;}
  .mini-table th,.mini-table td{border:1px solid var(--slate-200);padding:6px 8px;font-size:12px;}
  .mini-table th{background:var(--slate-50);font-weight:700;color:var(--slate-500);text-align:left;}

  /* ----- Marca / logo ----- */
  .brand{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
  .brand-mark{display:flex;align-items:center;justify-content:center;width:36px;height:36px;flex-shrink:0;}
  .brand-mark svg{width:100%;height:100%;}
  .brand-text{display:flex;flex-direction:column;line-height:1.1;}
  .brand-text b{font-size:20px;font-weight:800;color:#0a3da0;letter-spacing:.2px;font-family:Arial,Helvetica,sans-serif;}
  .brand-text b sup{font-size:9px;font-weight:700;top:-0.7em;}
  .brand-text span{font-size:10px;color:var(--slate-400);font-weight:700;letter-spacing:.6px;text-transform:uppercase;}

  /* ----- KPI clicables con comparativo ----- */
  .card-clickable{cursor:pointer;}
  .card-clickable .tap-hint{position:absolute;right:10px;bottom:8px;font-size:10px;color:var(--slate-300);
    opacity:0;transition:opacity .15s ease;font-weight:700;}
  .card-clickable:hover .tap-hint{opacity:1;color:var(--blue-700);}
  .cmp-row{margin-bottom:16px;}
  .cmp-row:last-child{margin-bottom:0;}
  .cmp-label{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;font-weight:700;color:var(--slate-600);margin-bottom:5px;}
  .cmp-label .v{font-size:13px;font-weight:800;color:var(--slate-800);}
  .cmp-track{height:14px;border-radius:999px;background:var(--slate-100);overflow:hidden;}
  .cmp-fill{height:100%;border-radius:999px;transition:width 1s cubic-bezier(.22,1,.36,1);
    background:linear-gradient(90deg,#1d4ed8,#0ea5e9);}
  .cmp-fill.green{background:linear-gradient(90deg,#4ade80,#15803d);}
  .cmp-fill.yellow{background:linear-gradient(90deg,#fde047,#b45309);}
  .cmp-fill.red{background:linear-gradient(90deg,#fca5a5,#b91c1c);}
  .cmp-note{font-size:12px;color:var(--slate-500);margin-top:14px;background:var(--blue-50);border-radius:8px;padding:8px 10px;}

  /* ----- Asistente de ventas (chatbot) ----- */
  .chat-panel{border-radius:16px;background:linear-gradient(155deg,#0b1a3a,#172554 60%,#1d4ed8);padding:16px;margin-bottom:4px;
    box-shadow:0 12px 26px -12px rgba(23,37,84,.5);position:relative;overflow:hidden;}
  .chat-panel::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(circle at 92% 0%,rgba(255,255,255,.12),transparent 45%);}
  .chat-panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;position:relative;z-index:1;}
  .chat-panel-who{display:flex;align-items:center;gap:10px;}
  .chat-bot-avatar{width:32px;height:32px;border-radius:999px;background:rgba(255,255,255,.16);display:flex;align-items:center;
    justify-content:center;font-size:16px;border:1px solid rgba(255,255,255,.25);}
  .chat-panel-who b{color:#fff;font-size:13px;display:block;}
  .chat-panel-who small{color:#bfdbfe;font-size:11px;}
  .chat-status{display:flex;align-items:center;gap:6px;font-size:11px;color:#bbf7d0;font-weight:700;}
  .chat-dot{width:7px;height:7px;border-radius:999px;background:#4ade80;box-shadow:0 0 0 0 rgba(74,222,128,.7);animation:pulseDot 1.8s infinite;}
  @keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(74,222,128,.6);}70%{box-shadow:0 0 0 7px rgba(74,222,128,0);}100%{box-shadow:0 0 0 0 rgba(74,222,128,0);}}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;position:relative;z-index:1;}
  .chip{border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);border-radius:999px;padding:6px 12px;

  const errEl = document.getElementById('gate-error');

  // Si ya autenticГғВі en esta sesiГғВіn, ocultar gate inmediatamente
  if (sessionStorage.getItem(GATE_KEY) === '1') {
    gate.classList.add('hidden');
    return;
  }

  // Bloquear scroll del fondo mientras gate estГғВЎ visible
  document.body.style.overflow = 'hidden';

  function tryAccess() {
    if (input.value.trim() === GATE_CODE) {
      sessionStorage.setItem(GATE_KEY, '1');
      gate.style.transition = 'opacity .4s';
      gate.style.opacity = '0';
      setTimeout(() => {
        gate.classList.add('hidden');
        document.body.style.overflow = '';
      }, 400);
    } else {
      errEl.textContent = 'CГғВіdigo incorrecto. Intenta nuevamente.';
      input.classList.add('shake');
      input.value = '';
      setTimeout(() => {
        input.classList.remove('shake');
        errEl.textContent = '';
      }, 1000);
    }
  }

  btn.addEventListener('click', tryAccess);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') tryAccess(); });
  // Auto-focus
  setTimeout(() => input.focus(), 100);
})();
</script>

function respuestaBot(pregunta) {
  const q = pregunta.toLowerCase();
  let mejor = null, mejorScore = 0;
  for (const item of BASE_CONOCIMIENTO) {
    let score = 0;
    for (const p of item.palabras) { if (q.includes(p.toLowerCase())) score++; }
    if (score > mejorScore) { mejorScore = score; mejor = item; }
  }
  if (mejor) return `Г°ВҹВ“ВҢ ${mejor.tema}\n\n${mejor.respuesta}`;
  return "No tengo una respuesta exacta para eso todavГғВӯa. PregГғВәntame sobre objeciones (precio, crГғВ©dito/cupo, competencia, stock, garantГғВӯa, calidad, tiempo de entrega, confianza en la marca) o sobre nuestras lГғВӯneas: FerreterГғВӯa, Maquinaria, Electro Menor, Robots KENNON, Consumo Masivo. Si es un caso muy puntual, consГғВәltalo directo con tu jefe zonal.";
}

// ---------------------------------------------------------------------------
// HELPERS DE CГғВҒLCULO Y COLOR
// ---------------------------------------------------------------------------
function pct(num, den) { if (!den) return 0; return (num / den) * 100; }
function colorCumplimiento(v) { if (v < 50) return "red"; if (v < 70) return "yellow"; return "green"; }
function colorCobertura(v) { if (v < 40) return "red"; if (v < 60) return "yellow"; return "green"; }
function colorInactivos(v) { if (v > 20) return "red"; if (v > 10) return "yellow"; return "green"; }
function colorCarteraVencida(v) { if (v > 10000) return "red"; if (v > 5000) return "yellow"; return "green"; }

function computeMetrics(a) {
  const pctCumplimiento = pct(a.ventaReal, a.presupuesto);
  const coberturaCalculada = a.cobVtas300 - a.cobVentasNegativo;
  const pctCobertura = pct(coberturaCalculada, a.baseCobertura);
  const pctInactivos = pct(a.clientesInactivos, a.baseCobertura);
  const cCumpl = colorCumplimiento(pctCumplimiento);
  const cCob = colorCobertura(pctCobertura);
  const cInact = colorInactivos(pctInactivos);
  const cCV = colorCarteraVencida(a.carteraVencida);
  const reds = [cCumpl, cCob, cInact, cCV].filter((c) => c === "red").length;
  const yellows = [cCumpl, cCob, cInact, cCV].filter((c) => c === "yellow").length;
  let estado = "En meta", estadoColor = "green";
  if (reds > 0) { estado = "CrГғВӯtico"; estadoColor = "red"; }
  else if (yellows > 0) { estado = "Alerta"; estadoColor = "yellow"; }
  return { pctCumplimiento, coberturaCalculada, pctCobertura, pctInactivos, cCumpl, cCob, cInact, cCV, estado, estadoColor };
}

const ASESORES_M = ASESORES.map((a) => ({ ...a, m: computeMetrics(a) }));

const TOTAL_VENTA = ASESORES_M.reduce((s, a) => s + a.ventaReal, 0);
const TOTAL_META = ASESORES_M.reduce((s, a) => s + a.presupuesto, 0);
const TOTAL_BASE_COBERTURA = ASESORES_M.reduce((s, a) => s + a.baseCobertura, 0);
const TOTAL_COBERTURA_CALCULADA = ASESORES_M.reduce((s, a) => s + a.m.coberturaCalculada, 0);
const TOTAL_CARTERA_VENCIDA = ASESORES_M.reduce((s, a) => s + a.carteraVencida, 0);
const TOTAL_INGRESADO_HOY = ASESORES_M.reduce((s, a) => s + a.ingresadoHoy, 0);
const TOTAL_ESPERADO_HOY = ASESORES_M.reduce((s, a) => s + a.esperadoHoy, 0);

const PCT_CUMPLIMIENTO_ZONA = pct(TOTAL_VENTA, TOTAL_META);
const PCT_COBERTURA_ZONA = pct(TOTAL_COBERTURA_CALCULADA, TOTAL_BASE_COBERTURA);
const DESFASE_HOY = TOTAL_INGRESADO_HOY - TOTAL_ESPERADO_HOY;
const ASESORES_CRITICOS = ASESORES_M.filter((a) => a.m.estado === "CrГғВӯtico");
const PROPORCION_DIA = DIA_ACTUAL / DIAS_MES;

const BAR_DATA = ASESORES_M.map((a) => ({
  nombre: a.nombre.split(" ")[0], ventaReal: a.ventaReal,
  metaProporcional: Math.round(a.presupuesto * PROPORCION_DIA),
}));

const META_DIARIA_ZONA = TOTAL_META / DIAS_MES;
const LINE_DATA = Array.from({ length: DIA_ACTUAL }, (_, i) => {
  const dia = i + 1;
  const metaAcumulada = Math.round(META_DIARIA_ZONA * dia);
  const progreso = Math.pow(dia / DIA_ACTUAL, 1.15);
  const realAcumulado = Math.round(TOTAL_VENTA * progreso);
  return { dia: "D" + dia, metaAcumulada, realAcumulado };
});

// ---------------------------------------------------------------------------
// DATA DE GRГғВҒFICOS POR ASESOR (portal individual) ГўВҖВ” misma lГғВіgica de
// proyecciГғВіn que LINE_DATA de zona, pero escalada a la venta real y al
// presupuesto propios de cada asesor.
// ---------------------------------------------------------------------------
function lineDataAsesor(a) {
  const metaDiaria = a.presupuesto / DIAS_MES;
  return Array.from({ length: DIA_ACTUAL }, (_, i) => {
    const dia = i + 1;
    const metaAcumulada = Math.round(metaDiaria * dia);
    const progreso = Math.pow(dia / DIA_ACTUAL, 1.15);
    const realAcumulado = Math.round(a.ventaReal * progreso);
    return { dia: "D" + dia, metaAcumulada, realAcumulado };
  });
}

function barDataAsesor(a) {
  const metaProp = Math.round(a.presupuesto * PROPORCION_DIA);
  return [{
    nombre: a.nombre.split(" ")[0],
    ventaReal: a.ventaReal,
    metaProporcional: metaProp,
    metaTotal: a.presupuesto,
  }];
}

function money(n) { return "$" + Math.round(n).toLocaleString("es-EC"); }
function pct1(n) { return n.toFixed(1) + "%"; }
function esc(s) { return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

function accionesPara(a) {
  const acciones = [];
  if (a.m.cCumpl !== "green") {
    const faltante = Math.max(0, Math.round(a.presupuesto * PROPORCION_DIA - a.ventaReal));
    acciones.push(`Cerrar pedidos adicionales por al menos ${money(faltante > 0 ? faltante : 500)} hoy para alinear la meta proporcional.`);
  }
  if (a.m.cCob !== "green") {
    const pendientes = Math.max(0, a.baseCobertura - a.m.coberturaCalculada);
    acciones.push(`Cerrar al menos ${Math.min(8, pendientes)} ventas adicionales ГўВүВҘ$300 hoy para subir tu cobertura (base ${a.baseCobertura}).`);
  }
  if (a.m.cCV !== "green") {
    acciones.push(`Gestionar el cobro de cartera vencida (${money(a.carteraVencida)}) priorizando los documentos mГғВЎs antiguos junto a la Oficial de CrГғВ©dito.`);

    acciones.push(`Contactar a los ${a.clientesInactivos} clientes inactivos prioritarios y ofrecer condiciГғВіn de reactivaciГғВіn.`);

  if (acciones.length === 0) {
    acciones.push("Mantener el ritmo actual y enfocar el excedente en aumentar el ticket promedio de tus mejores clientes.");

  return acciones.slice(0, 4);

function moneyShort(n) {
  const abs = Math.abs(n);
  if (abs >= 1000) {
    const k = (n / 1000).toFixed(1).replace(/\.0$/, "");
    return "$" + k + "k";
  }
  return "$" + Math.round(n);
}

function svgBarChart(data, bars, opts) {
  opts = opts || {};
  const kpi = opts.kpi || "venta";
  const max = Math.max(1, ...data.flatMap((d) => bars.map((b) => d[b.key])));
  const w = 600, h = 240, padding = 34, plotH = h - padding * 1.8;
  const groupWidth = (w - padding * 1.5) / data.length;
  const barWidth = groupWidth / (bars.length + 1);
  let rects = "";
  data.forEach((d, gi) => {
    const tipLines = bars.map((b) => `${b.name}: ${money(d[b.key])}`).join("|");
    bars.forEach((b, bi) => {
      const val = d[b.key];
      const barH = Math.max((val / max) * plotH, 1);
      const x = padding + gi * groupWidth + bi * barWidth + barWidth * 0.15;
      const y = h - padding - barH;
      const bw = barWidth * 0.7;
      rects += `<rect class="ichart-bar" data-zona-kpi="${esc(kpi)}" data-tip-title="${esc(d.nombre)}" data-tip-lines="${esc(tipLines)}"
        data-scope="${esc(opts.scope || "zona")}" data-asesor-id="${esc(opts.asesorId || "")}"
        x="${x}" y="${y}" width="${bw}" height="${barH}" fill="${b.color}" rx="6"></rect>`;
      if (bi === 0) {
        rects += `<text x="${x + bw / 2}" y="${y - 7}" font-size="10.5" font-weight="700" text-anchor="middle" fill="#1d4ed8" style="pointer-events:none;">${esc(moneyShort(val))}</text>`;
      }
    });
    rects += `<text x="${padding + gi * groupWidth + groupWidth / 2}" y="${h - 12}" font-size="11" font-weight="600" text-anchor="middle" fill="#475569">${esc(d.nombre)}</text>`;
  });
  let grid = "";
  [0, 0.25, 0.5, 0.75, 1].forEach((f) => {
    const y = h - padding - plotH * f;
    grid += `<line x1="${padding}" x2="${w - 5}" y1="${y}" y2="${y}" stroke="#eef2f7" />`;
  });
  const legend = bars.map((b) => `<span><span class="sw" style="background:${b.color}"></span>${esc(b.name)}</span>`).join("");
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:225px;">${grid}${rects}</svg><div class="chart-legend">${legend}</div>`;
}

function svgLineChart(data, lines, opts) {
  opts = opts || {};
  const max = Math.max(1, ...data.flatMap((d) => lines.map((l) => d[l.key])));
  const w = 600, h = 240, padding = 30, plotH = h - padding * 1.8;
  const stepX = (w - padding * 1.5) / Math.max(1, data.length - 1);
  function xAt(i) { return padding + i * stepX; }
  function yAt(key, i) { return h - padding - (data[i][key] / max) * plotH; }
  function pointsStr(key) {
    return data.map((d, i) => `${xAt(i)},${yAt(key, i)}`).join(" ");
  }
  const firstKey = lines[0].key;
  const lastX = xAt(data.length - 1);
  const areaPts = `${padding},${h - padding} ${pointsStr(firstKey)} ${lastX},${h - padding}`;
  let polylines = `<polygon points="${areaPts}" fill="${lines[0].color}" opacity="0.10"></polygon>`;
  polylines += lines.map((l) =>
    `<polyline points="${pointsStr(l.key)}" fill="none" stroke="${l.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="${l.dash || ""}" />`
  ).join("");
  let grid = "";
  [0, 0.25, 0.5, 0.75, 1].forEach((f) => {
    const y = h - padding - plotH * f;
    grid += `<line x1="${padding}" x2="${w - 5}" y1="${y}" y2="${y}" stroke="#eef2f7" />`;
  });
  let labels = "", hitAreas = "", dots = "";
  const colW = Math.max(stepX, 6);
  data.forEach((d, i) => {
    if (i % 5 === 0 || i === data.length - 1) {
      labels += `<text x="${xAt(i)}" y="${h - 10}" font-size="9" text-anchor="middle" fill="#64748b">${esc(d.dia)}</text>`;
    }
    const tipLines = lines.map((l) => `${l.name}: ${money(d[l.key])}`).join("|");
    hitAreas += `<rect class="ichart-hit" data-tip-title="${esc(d.dia)}" data-tip-lines="${esc(tipLines)}"
      data-dia="${i + 1}" data-real="${d.realAcumulado}" data-meta="${d.metaAcumulada}"
      data-label="${esc(opts.label || "zona")}"
      x="${xAt(i) - colW / 2}" y="6" width="${colW}" height="${h - padding - 6}" fill="transparent"></rect>`;
    if (i % 3 === 0 || i === data.length - 1) {
      dots += `<circle class="ichart-pt" data-tip-title="${esc(d.dia)}" data-tip-lines="${esc(tipLines)}"
        data-dia="${i + 1}" data-real="${d.realAcumulado}" data-meta="${d.metaAcumulada}"
        data-label="${esc(opts.label || "zona")}"
        cx="${xAt(i)}" cy="${yAt(firstKey, i)}" r="3.5" fill="${lines[0].color}" stroke="#fff" stroke-width="1.5"></circle>`;
    }
  });
  const legend = lines.map((l) => `<span><span class="sw" style="background:${l.color}"></span>${esc(l.name)}</span>`).join("");
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:225px;">${grid}${polylines}${dots}${hitAreas}${labels}</svg><div class="chart-legend">${legend}</div>`;
}

// INTERACTIVIDAD DE GRГғВҒFICOS ГўВҖВ” tooltip flotante + clic para ver detalle.
// Delegado a nivel documento: funciona sin re-enganchar listeners en cada
// render (los grГғВЎficos se regeneran como HTML cada vez que cambia el estado).

function buildChartTipHtml(el) {
  const title = el.getAttribute("data-tip-title") || "";
  const lines = (el.getAttribute("data-tip-lines") || "").split("|").filter(Boolean);
  return `<b>${esc(title)}</b>` + lines.map((l) => `<div>${esc(l)}</div>`).join("");
}

function showChartTip(html, x, y) {
  const tip = document.getElementById("chart-tip");
  if (!tip) return;
  tip.innerHTML = html;
  tip.style.left = x + "px";
  tip.style.top = y + "px";
  tip.classList.add("show");
}

function moveChartTip(x, y) {
  const tip = document.getElementById("chart-tip");
  if (!tip || !tip.classList.contains("show")) return;
  tip.style.left = x + "px";
  tip.style.top = y + "px";
}

function hideChartTip() {
  const tip = document.getElementById("chart-tip");
  if (tip) tip.classList.remove("show");
}

function abrirDetalleDia(dia, real, meta, label) {
  const r = Number(real), m = Number(meta);
  const max = Math.max(r, m, 1);
  const diff = r - m;
  const etiqueta = label && label !== "zona" ? esc(label) : "zona";
  const html = cmpBar("Real acumulado", r, max, diff >= 0 ? "green" : "red", money(r))
    + cmpBar("Meta acumulada", m, max, "", money(m))
    + `<p class="cmp-note">Diferencia a este dГғВӯa: ${diff >= 0 ? "+" : ""}${esc(money(diff))}${diff >= 0 ? " Г°ВҹВҺВү vas adelante de la meta" : " ГўВҖВ” hay que acelerar el ritmo"}</p>`;
  openModal(`Г°ВҹВ“ВҲ DГғВӯa ${esc(String(dia))} ГўВҖВ” acumulado ${etiqueta}`, html);
}

document.addEventListener("mouseover", (e) => {
  const el = e.target.closest(".ichart-bar, .ichart-pt, .ichart-hit");
  if (!el) return;
  showChartTip(buildChartTipHtml(el), e.clientX, e.clientY);
});

document.addEventListener("mousemove", (e) => {
  if (e.target.closest(".ichart-bar, .ichart-pt, .ichart-hit")) moveChartTip(e.clientX, e.clientY);
});

document.addEventListener("mouseout", (e) => {
  if (e.target.closest(".ichart-bar, .ichart-pt, .ichart-hit")) hideChartTip();
});

document.addEventListener("click", (e) => {
  const bar = e.target.closest(".ichart-bar");
  if (bar) {
    const kpi = bar.getAttribute("data-zona-kpi") || "venta";
    const scope = bar.getAttribute("data-scope") || "zona";
    if (scope === "asesor") {
      const adv = ASESORES_M.find((x) => x.id === bar.getAttribute("data-asesor-id"));
      if (adv) { abrirComparativoKPI(kpi, adv); return; }

  const pt = e.target.closest(".ichart-pt, .ichart-hit");

});

function loadLocal(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch (e) { return fallback; }
}
function saveLocal(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* sin storage disponible */ }
}

// Racha de constancia: dГғВӯas consecutivos (hasta ayer/hoy) en que el asesor
// completГғВі TODOS los puntos del checklist de cierre de visita.
function calcularRacha(asesorId) {
  let racha = 0;
  for (let i = 0; i < 60; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = `${asesorId}_${d.toISOString().slice(0, 10)}`;
    const reg = state.checklists[key];
    if (reg && reg.every((v) => v)) racha++;
    else break;
  }
  return racha;
}

function enviarPorWhatsApp(numero, mensaje) {
  const limpio = (numero || "").replace(/\D/g, "");
  if (limpio) {
    window.open(`https://wa.me/${limpio}?text=${encodeURIComponent(mensaje)}`, "_blank");
    return { ok: true };
  }
  try { if (navigator.clipboard) navigator.clipboard.writeText(mensaje); } catch (e) { /* sin portapapeles disponible */ }
  return { ok: false };
}

function handleAction(action) {
  if (action === "modal-whatsapp") {
    const blocks = ASESORES_M.map((a, idx) => {
      const btnLabel = a.nombre.split(" ")[0];
      const btn = a.whatsapp
        ? `<button class="btn-primary" style="margin-top:8px;font-size:12px;" data-wa-idx="${idx}">Г°ВҹВ“ВІ Enviar a ${esc(btnLabel)}</button>`
        : `<button class="btn-primary" style="margin-top:8px;font-size:12px;background:var(--amber-500);" data-copy-idx="${idx}">Г°ВҹВ“ВӢ Copiar mensaje de ${esc(btnLabel)}</button>`;
      return `<div class="wa-block"><p>${esc(a.nombre)}</p><pre>${esc(mensajeWhatsApp(a))}</pre>${btn}</div>`;
    }).join("");
    openModal("Seguimiento WhatsApp a asesores", blocks, () => {
      document.querySelectorAll("[data-wa-idx]").forEach(btn => {
        btn.addEventListener("click", () => {
          const a = ASESORES_M[+btn.dataset.waIdx];

        });
      });
      document.querySelectorAll("[data-copy-idx]").forEach(btn => {

      () => {

          navigator.clipboard.writeText(msg);
          document.getElementById("confirm-eba").innerHTML = `<p class="confirm-banner">ГўВңВ… Reporte copiado. PГғВ©galo en el grupo WhatsApp.</p>`;
        });
      });

    const msg = mensajeBuenosDias();
    openModal("Buenos dГғВӯas equipo",
      `<pre>${esc(msg)}</pre><button class="btn-primary" style="margin-top:10px;" id="btn-bd-copy">Г°ВҹВ“ВӢ Copiar mensaje</button><p style="font-size:12px;color:var(--amber-700);margin-top:6px;">Pega este mensaje en el grupo WhatsApp Zona Austro.</p><div id="confirm-bd"></div>`,
      () => {
        document.getElementById("btn-bd-copy").addEventListener("click", () => {
          navigator.clipboard.writeText(msg);
          document.getElementById("confirm-bd").innerHTML = `<p class="confirm-banner">ГўВңВ… Mensaje copiado. PГғВ©galo en el grupo WhatsApp.</p>`;
        });
      });
  } else if (action === "modal-resumen7pm") {
    const msg = resumen7pm();
    openModal("Resumen 7pm a Diego",
      `<pre>${esc(msg)}</pre><button class="btn-primary" style="margin-top:10px;" id="btn-res7-wa">Г°ВҹВ“ВІ Enviar a mi WhatsApp</button><div id="confirm-res7"></div>`,
      () => {
        document.getElementById("btn-res7-wa").addEventListener("click", () => {
          const r = enviarPorWhatsApp(WHATSAPP_DIEGO, msg);
          document.getElementById("confirm-res7").innerHTML = r

function openModal(title, bodyHtml, afterRender) {
  document.getElementById("modal-root").innerHTML = `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-box">
        <div class="modal-head"><h3>${esc(title)}</h3><button class="modal-close" id="modal-close-btn">ГўВңВ•</button></div>
        <div class="modal-body">${bodyHtml}</div>
      </div>
    </div>`;
  document.getElementById("modal-close-btn").addEventListener("click", closeModal);
  document.getElementById("modal-overlay").addEventListener("click", (e) => {
    if (e.target.id === "modal-overlay") closeModal();
  });
  if (typeof afterRender === "function") afterRender();
}
function closeModal() { document.getElementById("modal-root").innerHTML = ""; }

function cmpBar(label, value, max, color, displayValue) {
  const w = max > 0 ? Math.min(100, (value / max) * 100) : 0;
  const colorClass = color ? color : "";
  return `<div class="cmp-row">
    <div class="cmp-label"><span>${esc(label)}</span><span class="v">${esc(displayValue)}</span></div>
    <div class="cmp-track"><div class="cmp-fill ${colorClass}" style="width:${w.toFixed(0)}%"></div></div>
  </div>`;
}

  const metaProp = Math.round(a.presupuesto * PROPORCION_DIA);

  const filas = [
    {
      kpi: "venta", icon: "Г°ВҹВ’В°", nombre: "Venta vs meta",
      real: money(a.ventaReal), meta: money(a.presupuesto), color: a.m.cCumpl,

      real: `${a.m.coberturaCalculada}/${a.baseCobertura}`, meta: pct1(a.m.pctCobertura), color: a.m.cCob,

      detalle: "Umbral de alerta / crГғВӯtico",
    },
    {
      kpi: "inactivos", icon: "Г°ВҹВ‘ВҘ", nombre: "Clientes inactivos",
      real: String(a.clientesInactivos), meta: `${pct1(a.m.pctInactivos)} de la cartera`, color: a.m.cInact,
      detalle: `de ${a.baseCobertura} asignados`,
    },
  ];
  const filasHtml = filas.map((f) => `

function abrirComparativoKPI(tipo, a) {
  const nombre = a.nombre.split(" ")[0];
  let title = "", html = "";

  if (tipo === "venta") {
    const metaProp = Math.round(a.presupuesto * PROPORCION_DIA);
    const max = Math.max(a.ventaReal, a.presupuesto, metaProp);
    const desfase = a.ventaReal - metaProp;
    title = `Г°ВҹВ’В° Venta real ГўВҖВ” ${nombre}`;
    html = cmpBar("Venta real (acumulado del mes)", a.ventaReal, max, a.m.cCumpl, money(a.ventaReal))
      + cmpBar(`Meta proporcional al dГғВӯa ${DIA_ACTUAL}`, metaProp, max, "yellow", money(metaProp))
      + cmpBar("Meta total del mes", a.presupuesto, max, "green", money(a.presupuesto))
      + `<p class="cmp-note">Desfase vs. meta proporcional a la fecha: <strong>${desfase >= 0 ? "+" : ""}${esc(money(desfase))}</strong></p>`;
  } else if (tipo === "cumplimiento") {
    title = `Г°ВҹВҺВҜ % Cumplimiento ГўВҖВ” ${nombre}`;
    html = cmpBar("Cumplimiento actual", Math.min(100, a.m.pctCumplimiento), 100, a.m.cCumpl, pct1(a.m.pctCumplimiento))
      + cmpBar("Meta de zona", 100, 100, "green", "100%")
      + `<p class="cmp-note">Г°ВҹВҹВў ГўВүВҘ70% del presupuesto &nbsp; Г°ВҹВҹВЎ 50ГўВҖВ“69% &nbsp; Г°ВҹВ”Вҙ &lt;50%</p>`;
  } else if (tipo === "cobertura") {
    title = `Г°ВҹВ“ВЎ Cobertura (CM016) ГўВҖВ” ${nombre}`;
    html = cmpBar("Cobertura real (neta)", a.m.coberturaCalculada, a.baseCobertura, a.m.cCob, `${a.m.coberturaCalculada}/${a.baseCobertura}`)
      + cmpBar("Ventas ГўВүВҘ$300 (antes de restar negativas)", a.cobVtas300, a.baseCobertura, "", String(a.cobVtas300))
      + cmpBar("Ventas negativas (se restan)", a.cobVentasNegativo, a.baseCobertura, "red", String(a.cobVentasNegativo))
      + `<p class="cmp-note">Meta base: ${a.baseCobertura} clientes con compra ГўВүВҘ$300/mes. Г°ВҹВҹВў ГўВүВҘ60% &nbsp; Г°ВҹВҹВЎ 40ГўВҖВ“59% &nbsp; Г°ВҹВ”Вҙ &lt;40%</p>`;
  } else if (tipo === "cartera") {
    const max = Math.max(a.carteraVencida, 10000);
    title = `Г°ВҹВ§Вҫ Cartera vencida (CXC008) ГўВҖВ” ${nombre}`;
    html = cmpBar("Cartera vencida actual", a.carteraVencida, max, a.m.cCV, money(a.carteraVencida))
      + cmpBar("Umbral de alerta", 5000, max, "yellow", money(5000))
      + cmpBar("Umbral crГғВӯtico", 10000, max, "red", money(10000))
      + `<p class="cmp-note">Г°ВҹВҹВў &lt;$5,000 &nbsp; Г°ВҹВҹВЎ $5,000ГўВҖВ“$10,000 &nbsp; Г°ВҹВ”Вҙ &gt;$10,000</p>`;
  } else if (tipo === "inactivos") {
    title = `Г°ВҹВ‘ВҘ Clientes inactivos ГўВҖВ” ${nombre}`;
    html = cmpBar("Clientes inactivos", a.clientesInactivos, a.baseCobertura, a.m.cInact, `${a.clientesInactivos} (${pct1(a.m.pctInactivos)})`)
      + cmpBar("Cartera asignada (base)", a.baseCobertura, a.baseCobertura, "green", String(a.baseCobertura))
      + `<p class="cmp-note">Г°ВҹВҹВў ГўВүВӨ10% de la cartera &nbsp; Г°ВҹВҹВЎ 11ГўВҖВ“20% &nbsp; Г°ВҹВ”Вҙ &gt;20% inactiva. Prioriza recuperar primero a los de mayor compra histГғВіrica.</p>`;
  }

  openModal(title, html);
}

    title = "Г°ВҹВ’В° Venta vs meta ГўВҖВ” por asesor";
    const max = Math.max(1, ...ASESORES_M.map((a) => Math.max(a.ventaReal, a.presupuesto)));
    html = ASESORES_M.map((a) =>
      cmpBar(a.nombre.split(" ")[0], a.ventaReal, max, a.m.cCumpl, `${money(a.ventaReal)} de ${money(a.presupuesto)}`)
    ).join("") + `<p class="cmp-note">Total zona: ${esc(money(TOTAL_VENTA))} de ${esc(money(TOTAL_META))} (${esc(pct1(PCT_CUMPLIMIENTO_ZONA))})</p>`;
  } else if (tipo === "cumplimiento") {
    title = "Г°ВҹВҺВҜ % Cumplimiento ГўВҖВ” por asesor";
    html = ASESORES_M.map((a) =>
      cmpBar(a.nombre.split(" ")[0], Math.min(100, a.m.pctCumplimiento), 100, a.m.cCumpl, pct1(a.m.pctCumplimiento))
    ).join("") + cmpBar("Meta de zona", 100, 100, "green", "100%")
      + `<p class="cmp-note">Cumplimiento de zona: ${esc(pct1(PCT_CUMPLIMIENTO_ZONA))}</p>`;
  } else if (tipo === "cobertura") {
    title = "Г°ВҹВ“ВЎ % Cobertura ГўВҖВ” por asesor";
    html = ASESORES_M.map((a) =>
      cmpBar(a.nombre.split(" ")[0], Math.min(100, a.m.pctCobertura), 100, a.m.cCob, `${a.m.coberturaCalculada}/${a.baseCobertura} (${pct1(a.m.pctCobertura)})`)
    ).join("") + `<p class="cmp-note">Cobertura de zona: ${esc(pct1(PCT_COBERTURA_ZONA))}</p>`;
  } else if (tipo === "cartera") {
    title = "Г°ВҹВ§Вҫ Cartera vencida ГўВҖВ” por asesor";
    const max = Math.max(10000, ...ASESORES_M.map((a) => a.carteraVencida));
    html = ASESORES_M.map((a) =>
      cmpBar(a.nombre.split(" ")[0], a.carteraVencida, max, a.m.cCV, money(a.carteraVencida))
    ).join("") + `<p class="cmp-note">Total zona: ${esc(money(TOTAL_CARTERA_VENCIDA))} ГӮВ· Г°ВҹВҹВў &lt;$5,000 &nbsp; Г°ВҹВҹВЎ $5,000ГўВҖВ“$10,000 &nbsp; Г°ВҹВ”Вҙ &gt;$10,000</p>`;
  } else if (tipo === "alertas") {
    title = `Г°ВҹВҡВЁ Alertas crГғВӯticas (${ASESORES_CRITICOS.length})`;
    if (ASESORES_CRITICOS.length === 0) {
      html = `<p class="cmp-note">Ninguna alerta crГғВӯtica hoy. Г°ВҹВҺВү</p>`;
    } else {
      html = ASESORES_CRITICOS.map((a) => {
        const motivos = [];
        if (a.m.cCumpl === "red") motivos.push("cumplimiento");
        if (a.m.cCob === "red") motivos.push("cobertura");
        if (a.m.cCV === "red") motivos.push("cartera vencida");
        if (a.m.cInact === "red") motivos.push("clientes inactivos");
        return `<div class="cmp-row">
          <div class="cmp-label"><span>${esc(a.nombre)}</span>${badge("red", "CrГғВӯtico")}</div>
          <p class="cmp-note" style="margin-top:0;">Motivo(s): ${esc(motivos.join(", ") || "ver detalle en la tabla principal")}.</p>
        </div>`;
      }).join("");
    }
  }

  openModal(title, html);
}

  document.querySelectorAll(".chat-panel .chip").forEach((chip) => {

      state.chatHistory.push({ from: "user", text: txt });

function wireInforme(a) {

      requerimiento: document.getElementById("ic-requerimiento").value,
      comentarios: document.getElementById("ic-comentarios").value.trim(),

  document.getElementById("btn-informe-mail").addEventListener("click", () => {

          <button class="cb-btn" id="cb-btn" title="Ari ГўВҖВ” Asistente IA Soyoda" aria-label="Abrir asistente Ari" aria-haspopup="dialog">${CB_SVG_BOT}</button>
        </div>
      </div>
      <div class="cb-bubble" id="cb-bubble">${CB_FRASES[0]}</div>
    </div>
    <div class="cb-panel hidden" id="cb-panel" role="dialog" aria-label="Asistente Ari ГўВҖВ” Chat IA Soyoda" aria-modal="true">
      <div class="cb-header">
        <div class="cb-avatar">${CB_SVG_HEADER}</div>
        <div class="cb-hinfo"><b>Ari ГӮВ· Asistente Soyoda</b><span>IA ГӮВ· Zona Austro ГӮВ· En lГғВӯnea</span></div>
        <div class="cb-online"></div>
        <button class="cb-close" id="cb-close" aria-label="Cerrar asistente Ari">ГўВңВ•</button>
      </div>
      <div class="cb-messages" id="cb-messages">
        <div class="cb-msg bot">ГӮВЎHola! Soy <b>Ari</b>, el asistente IA de Soyoda Г°ВҹВӨВ–<br>Puedo ayudarte con ventas, cartera, productos o procesos del equipo. ГӮВҝEn quГғВ© te ayudo?</div>
      </div>
      <div class="cb-input-row">
        <input class="cb-input" id="cb-input" placeholder="PregГғВәntale a Ari..." autocomplete="off"/>
        <button class="cb-send" id="cb-send" aria-label="Enviar mensaje a Ari">ГўВһВӨ</button>
      </div>
    </div>`;

  const showBubble = () => {
    const b = document.getElementById("cb-bubble");
    if (!b || panelOpen) return;
    b.style.display = "";
    b.style.animation = "none";
    b.offsetHeight;
    b.style.animation = "";
    clearTimeout(bubbleTimer);
    bubbleTimer = setTimeout(() => { if (b && !panelOpen) b.style.display = "none"; }, 14000);
  };

  // Ocultar burbuja inicial despuГғВ©s de 14s (ya empieza visible)
  bubbleTimer = setTimeout(() => {
    const b = document.getElementById("cb-bubble");
    if (b && !panelOpen) b.style.display = "none";
  }, 14000);

  // Rotar frases cada 3 minutos y mostrar burbuja
  setInterval(() => {
    fraIdx = (fraIdx + 1) % CB_FRASES.length;
    const b = document.getElementById("cb-bubble");
    if (b && !panelOpen) { b.textContent = CB_FRASES[fraIdx]; showBubble(); }
  }, 3 * 60 * 1000);

  document.getElementById("cb-btn").addEventListener("click", () => {
    panelOpen = !panelOpen;
    const panel = document.getElementById("cb-panel");
    const bubble = document.getElementById("cb-bubble");
    panel.classList.toggle("hidden", !panelOpen);
    if (bubble) bubble.style.display = panelOpen ? "none" : "";
    if (panelOpen) { clearTimeout(bubbleTimer); document.getElementById("cb-input").focus(); }
  });

  document.getElementById("cb-close").addEventListener("click", () => {
    panelOpen = false;
    document.getElementById("cb-panel").classList.add("hidden");
  });

  const sendMsg = async () => {
    const input = document.getElementById("cb-input");
    const msgs = document.getElementById("cb-messages");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";

    const uDiv = document.createElement("div");
    uDiv.className = "cb-msg user";
    uDiv.textContent = text;
    msgs.appendChild(uDiv);

    const typing = document.createElement("div");
    typing.className = "cb-msg typing";
    typing.textContent = "Ari estГғВЎ escribiendo...";
    msgs.appendChild(typing);
    msgs.scrollTop = msgs.scrollHeight;

    let respuesta = "";

    if (CB_WORKER_URL) {
      try {
        const res = await fetch(CB_WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages: [{ role: "user", content: text }],
            context: "Eres Ari, el asistente IA de Soyoda S.A., empresa distribuidora ecuatoriana de ferreterГғВӯa, llantas, motores y maquinaria. Ayudas al equipo comercial de la Zona Austro (Cuenca, Ecuador). Responde en espaГғВұol, de forma breve y directa, mГғВЎximo 3 pГғВЎrrafos."
          })
        });
        const data = await res.json();
        respuesta = data.response || data.content || "No pude obtener respuesta. Intenta de nuevo.";
      } catch (e) {
        respuesta = "ГўВҡВ ГҜВёВҸ Sin conexiГғВіn con la IA. Intenta de nuevo en un momento.";
      }
    } else {
      await new Promise(r => setTimeout(r, 700));
      respuesta = cbRespuestaLocal(text);
    }

    typing.remove();
    const bDiv = document.createElement("div");
    bDiv.className = "cb-msg bot";
    bDiv.innerHTML = respuesta.replace(/\n/g, "<br>");
    msgs.appendChild(bDiv);
    msgs.scrollTop = msgs.scrollHeight;
  };

  document.getElementById("cb-send").addEventListener("click", sendMsg);
  document.getElementById("cb-input").addEventListener("keydown", e => { if (e.key === "Enter") sendMsg(); });
}

function cbRespuestaLocal(texto) {
  const t = texto.toLowerCase();
  if (/cobertura|visita|cliente/.test(t)) return "La cobertura mГғВӯnima esperada es 40 clientes activos por asesor. Si un cliente lleva mГғВЎs de 30 dГғВӯas sin compra, entra como inactivo. El objetivo es visitarlo esta semana con una propuesta concreta.";
  if (/cartera|vencid|cobro|deuda/.test(t)) return "La cartera vencida debe gestionarse semanalmente. Prioriza clientes con mГғВЎs de 60 dГғВӯas. Coordina con el ГғВЎrea de Cartera (Base Cobranza) antes de visitar al cliente.";
  if (/pedido|orden|stock|inventario/.test(t)) return "Para pedidos urgentes o con problemas de stock, reporta la necesidad al ГғВЎrea de Pedidos (Rudy Vargas / Madelein) directamente desde tu portal en la secciГғВіn 'Enviar necesidad a un ГғВЎrea'.";
  if (/precio|descuento|oferta/.test(t)) return "No defiendas el precio solo: compara costo total ГўВҖВ” calidad, garantГғВӯa, disponibilidad y plazo de crГғВ©dito. Si el cliente insiste, consulta con tu jefe zonal antes de ofrecer condiciГғВіn especial.";
  if (/meta|presupuesto|cumplimiento/.test(t)) return "El cumplimiento de presupuesto se evalГғВәa diariamente. Si estГғВЎs por debajo del 50% a mitad de mes, activa el plan de recuperaciГғВіn: clientes top, cobranza pendiente y nuevas oportunidades.";
  if (/motiva|ГғВЎnimo|desГғВЎnimo|cansado/.test(t)) return "ГӮВЎArriba el ГғВЎnimo! Cada llamada que no cierra te acerca a la que sГғВӯ cierra. Los mejores meses del equipo siempre empezaron con un mal lunes. TГғВә puedes. Г°ВҹВ’ВӘ";
  if (/producto|catГғВЎlogo|lГғВӯnea|marca/.test(t)) return "Los catГғВЎlogos de productos estГғВЎn disponibles en tu portal en la secciГғВіn 'CatГғВЎlogos'. Si necesitas informaciГғВіn especГғВӯfica de una lГғВӯnea, consГғВәltame o revisa directamente el catГғВЎlogo en PDF.";
  if (/inactivo|recuperar|reactivar/.test(t)) return "Para reactivar un cliente inactivo: 1) LlГғВЎmalo con una novedad de producto relevante. 2) Ofrece revisiГғВіn de inventario sin compromiso. 3) Si tiene cartera vencida, coordina primero con cobranza antes de visitar.";
  if (/gracias|perfecto|ok|listo/.test(t)) return "ГӮВЎCon gusto! Si necesitas algo mГғВЎs, aquГғВӯ estoy. Г°ВҹВӨВқ";
  if (/hola|buenos|saludos/.test(t)) return "ГӮВЎHola! ГӮВҝEn quГғВ© te puedo ayudar hoy? Puedo orientarte sobre ventas, cobertura, cartera, productos o cualquier proceso del equipo.";
  return "Entendido. Para esa consulta te recomiendo hablar directamente con Diego Barros (Jefe Zonal) o reportar la situaciГғВіn por WhatsApp. Una vez conectado el asistente IA completo podrГғВ© responderte con mГғВЎs detalle.";
}

// Inicializar chatbot al cargar
initChatbot();

// ---------------------------------------------------------------------------
// PWA ГўВҖВ” registro del service worker (instalable + funciona sin internet
// mostrando la ГғВәltima versiГғВіn guardada)
// ---------------------------------------------------------------------------
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
